<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crust & Chilly - Stock Out</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <!-- SEO Meta Tags -->
<meta name="description" content="Modern Inventory Management System - Track products, purchases, suppliers, and generate reports">
<meta name="keywords" content="inventory, stock, management, business, warehouse, POS">
<meta name="author" content="AI Tool Cor">
<meta name="robots" content="index, follow">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://inventory.aitoolcor.com/">
<meta property="og:title" content="Inventory System - AI Tool Cor">
<meta property="og:description" content="Modern Inventory Management System">
<meta property="og:image" content="https://inventory.aitoolcor.com/assets/images/og-image.png">

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="https://inventory.aitoolcor.com/">
<meta property="twitter:title" content="Inventory System">
<meta property="twitter:description" content="Modern Inventory Management System">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png">

<!-- PWA Manifest -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#a78bfa">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Inventory">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-pizza-slice"></i>
                    <div class="logo-text">
                        <span class="logo-title">CRUST & CHILLY</span>
                        <span class="logo-subtitle">INVENTORY</span>
                    </div>
                </div>
                <button class="sidebar-close" id="sidebarClose"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-chart-pie"></i><span>Dashboard</span></a></li>
                    <li><a href="inventory.html"><i class="fas fa-box"></i><span>Inventory</span></a></li>
                    <li><a href="purchase.html"><i class="fas fa-cart-plus"></i><span>Purchase</span></a></li>
                    <li class="active"><a href="stockout.html"><i class="fas fa-dolly"></i><span>Stock Out</span></a></li>
                    <li><a href="suppliers.html"><i class="fas fa-truck"></i><span>Suppliers</span></a></li>
                    <li><a href="reports.html"><i class="fas fa-file-lines"></i><span>Reports</span></a></li>
                    <li><a href="settings.html"><i class="fas fa-cog"></i><span>Settings</span></a></li>
                </ul>
            </nav>
            <div class="sidebar-profile-wrapper"></div>
        </aside>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <main class="main-content">
            <header class="header">
                <div class="header-left">
                    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
                    <h2 class="page-title">📤 Stock Out</h2>
                </div>
                <div class="header-right">
                    <div class="notification" id="notificationBtn">
                        <i class="fas fa-bell"></i>
                        <span class="badge" id="notifBadge">0</span>
                    </div>
                    <div class="user-profile">
                        <div class="avatar"><i class="fas fa-user"></i></div>
                        <span class="user-name">Admin</span>
                    </div>
                </div>
            </header>

            <div class="page-content">
                <div class="toolbar glass-card">
                    <div class="toolbar-left">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" placeholder="Search stock out..." id="stockoutSearch">
                        </div>
                        <input type="date" class="filter-date" id="stockoutDateFilter">
                    </div>
                    <div class="toolbar-right">
                        <button class="btn btn-primary" id="addStockOutBtn">
                            <i class="fas fa-plus"></i> New Stock Out
                        </button>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="table-responsive">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Product</th>
                                    <th>Quantity</th>
                                    <th>Reason</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="stockoutTableBody">
                                <tr>
                                    <td colspan="5" class="empty-state">
                                        <i class="fas fa-dolly"></i>
                                        <p>No stock out records</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Stock Out Modal -->
    <div class="modal-overlay" id="stockoutModal">
        <div class="modal glass-modal">
            <div class="modal-header">
                <h2>New Stock Out</h2>
                <button class="modal-close" id="closeStockoutModal"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="stockoutForm">
                    <input type="hidden" id="stockoutId">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="stockoutDate" required>
                        </div>
                        <div class="form-group">
                            <label>Product *</label>
                            <select id="stockoutProduct" required>
                                <option value="">Select Product</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Available Stock</label>
                            <input type="number" id="availableStock" readonly>
                        </div>
                        <div class="form-group">
                            <label>Quantity *</label>
                            <input type="number" id="stockoutQuantity" required min="1">
                        </div>
                        <div class="form-group full-width">
                            <label>Reason *</label>
                            <select id="stockoutReason" required>
                                <option value="">Select Reason</option>
                                <option value="Sale">Sale</option>
                                <option value="Damage">Damage</option>
                                <option value="Return">Return</option>
                                <option value="Expired">Expired</option>
                                <option value="Sample">Sample</option>
                                <option value="Other">Other</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="cancelStockout">Cancel</button>
                <button class="btn btn-primary" id="saveStockout">Save</button>
            </div>
        </div>
    </div>

    <!-- Notification Panel -->
    <div class="notification-panel" id="notificationPanel">
        <div class="notif-header">
            <h3>Notifications</h3>
            <button class="notif-close" id="notifClose"><i class="fas fa-times"></i></button>
        </div>
        <div class="notif-body" id="notifBody"></div>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/firebase-sync.js"></script>
    <script src="js/app.js"></script>
    <script src="js/simulator.js"></script>
    <script src="js/stockout.js"></script>
</body>
</html>
